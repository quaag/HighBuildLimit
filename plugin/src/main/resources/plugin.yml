name: HighBuildLimit
version: '${version}'
main: com.example.highbuildlimit.HighBuildLimitPlugin
api-version: '1.21'
description: Diagnostic/companion for the HighBuildLimit datapack. Reports each world's real build height and verifies the datapack is active. Does NOT change world height itself.
author: quaag
commands:
  highbuildlimit:
    description: HighBuildLimit info/version, reload, and ShadowSafe tools.
    usage: |-
      /highbuildlimit [version|info|reload]
      /hbl shadowsafe <info|scan|dryrun|convert|restore|list|reload> [radius]
    aliases: [hbl]
permissions:
  highbuildlimit.admin:
    description: Access to admin commands (ShadowSafe scan/convert/map).
    default: op
