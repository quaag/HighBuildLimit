# =====================================================================
# HighBuildLimit configuration
# =====================================================================
#
# IMPORTANT — READ THIS:
# This plugin does NOT change world/build height by itself. In Minecraft
# Java, the build height is fixed by the *dimension type*, which is
# data-driven (a datapack). There is no safe Paper API/NMS call that
# resizes an already-loaded world's chunk sections at runtime.
#
# The HighBuildLimit DATAPACK is what actually raises the limit. It keeps
# each dimension's vanilla min_y unchanged and only raises the top toward
# Y=2031 (infinite height is impossible in Minecraft).
# This plugin is a companion/diagnostic only: it reports each world's
# real min/max build height and tells you whether the datapack worked.
#
# The values below describe what you EXPECT the datapack to do, so that
# "/highbuildlimit info" can verify it. Changing them does not change
# any world's height.
# ---------------------------------------------------------------------

# Master toggle for the plugin's logging/verification output.
enabled: true

# The maximum placeable Y you expect after installing the datapack.
# (Minecraft's absolute maximum is 2031. See README.)
target-max-y: 2031

# Which dimensions you expect the datapack to have raised.
# Used only by "/highbuildlimit info" to flag mismatches.
apply-overworld: true
apply-nether: false
apply-end: true

# Verbose logging on enable.
debug: false

# ---------------------------------------------------------------------
# ShadowSafe: stop tall builds from shadowing the ground, the safe way.
# No NMS, public API only. No resource pack.
# ---------------------------------------------------------------------
# How it works: convert full blocks above min-y into a transparent proxy
# block (default glass) and spawn a BlockDisplay showing the original block.
# Glass does not block skylight, so the ground below stays lit, while the
# build still looks like the original block.
#
# Only simple full blocks convert. Containers, tile entities, and detail
# blocks (stairs/slabs/fences/panes/plants/etc.) are skipped by design.
# Use /hbl shadowsafe scan -> dryrun -> convert, and restore to undo.
shadow-safe:
  enabled: true
  min-y: 300
  # Transparent replacement block. Keep it light-safe (glass / stained glass).
  proxy-block: glass
  # Max radius (blocks) for scan/dryrun/convert/restore.
  max-radius: 64
  # Blocks processed per server tick (higher = faster but heavier).
  batch-size: 1000
